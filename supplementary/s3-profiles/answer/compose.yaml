services:
  app:
    build:
      dockerfile: Containerfile
      context: .

    volumes:
      - type: bind
        source: .
        target: /app
      - /app/.venv

    networks:
      backend_network:
        ipv4_address: 10.0.1.10
      frontend_network:
        ipv4_address: 172.100.0.10

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:18.3-trixie
    container_name: postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myapp_db}

    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-myapp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

    networks:
      backend_network:
        ipv4_address: 10.0.1.20

  redis:
    image: docker.io/library/redis:8.6.1-trixie
    container_name: redis_cache

    command: redis-server --save 60 1 --loglevel warning

    volumes:
      - type: volume
        source: redis_data
        target: /data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    networks:
      backend_network:
        ipv4_address: 10.0.1.30

  caddy:
    image: docker.io/library/caddy:2.11.2-alpine
    container_name: caddy_proxy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
      - type: volume
        source: caddy_logs
        target: /var/log/caddy
      - type: volume
        source: caddy_data
        target: /data
      - type: volume
        source: caddy_config
        target: /config

    networks:
      frontend_network:
        ipv4_address: 172.100.0.20

    depends_on:
      - app

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    container_name: pgadmin
    profiles:
      - debug

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050

    ports:
      - "5050:5050"

    networks:
      backend_network:
        ipv4_address: 10.0.1.40
      debug_network:

    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: docker.io/redis/redisinsight:latest
    container_name: redisinsight
    profiles:
      - debug

    ports:
      - "5540:5540"

    networks:
      backend_network:
        ipv4_address: 10.0.1.50
      debug_network:

    depends_on:
      redis:
        condition: service_healthy

networks:
  backend_network:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 10.0.1.0/24
          gateway: 10.0.1.1

  frontend_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.100.0.0/24
          gateway: 172.100.0.1

  debug_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:
