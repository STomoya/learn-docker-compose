services:
  app:
    build:
      dockerfile: Containerfile
      context: .

    ports:
      - "8000:8000"

    volumes:
      - type: bind
        source: .
        target: /app
      - /app/.venv

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:18.3-trixie
    container_name: postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}

    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-myapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:8.6.1-trixie
    container_name: redis_cache

    command: redis-server --save 60 1 --loglevel warning

    volumes:
      - type: volume
        source: redis_data
        target: /data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
